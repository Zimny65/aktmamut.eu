<!doctype html>
<html lang="pl">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>IMGW – temperatura godzinowa</title>
        <style>
            body {
                font-family: system-ui, Arial, sans-serif;
                margin: 20px;
            }
            .row {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                align-items: center;
                margin-bottom: 12px;
            }
            input,
            button {
                padding: 8px 10px;
                font-size: 14px;
            }
            canvas {
                border: 1px solid #ddd;
                border-radius: 8px;
                max-width: 100%;
            }
            .hint {
                color: #666;
                font-size: 13px;
                margin-top: 8px;
            }
        </style>
    </head>
    <body>
        <h1>IMGW – temperatura godzinowa (średnia)</h1>

        <div class="row">
            <label>Stacja:</label>
            <input id="station" value="352200375" />
            <label>Miesiąc (YYYY-MM):</label>
            <input id="month" value="2026-01" />
            <button id="load">Wczytaj</button>
        </div>

        <canvas id="chart" width="1100" height="420"></canvas>
        <div id="status" class="hint"></div>

        <script src="app.js"></script>
    </body>
</html>
