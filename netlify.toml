[build]
  publish = "."

# 1. Nagłówki bezpieczeństwa dla całej strony
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    # DODANO https://flagcdn.com do img-src oraz czcionki Google do style-src i font-src
    Content-Security-Policy = "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://*.unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://*.unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org https://*.openstreetmap.org https://tile.openstreetmap.org https://unpkg.com https://*.unpkg.com https://flagcdn.com; worker-src 'self' blob:;"
# 2. Ultra-szybkie ładowanie obrazków i wideo (Cache na 1 rok)
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/video/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 3. Cache dla danych JSON (Cache na 1 godzinę - optymalne dla aktualizacji wyników)
[[headers]]
  for = "/challenges/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/expeditions/*.geojson"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/expeditions/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"