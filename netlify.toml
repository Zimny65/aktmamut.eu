[build]
  publish = "."

# =========================================================
# 1. REWRITE dla subdomeny kampinos.aktmamut.eu
# =========================================================
[[redirects]]
  from = "https://kampinos.aktmamut.eu/*"
  to = "/maps/kampinos.html"
  status = 200
  force = true

# =========================================================
# 2. PODSTAWOWE HEADERS BEZPIECZEŃSTWA
# =========================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# =========================================================
# 3. DŁUGI CACHE DLA STATYCZNYCH PLIKÓW
#    tylko jeśli tych plików nie nadpisujesz stale pod tą samą nazwą
# =========================================================
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/video/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# =========================================================
# 4. KRÓTSZY CACHE DLA DANYCH MAP
# =========================================================
[[headers]]
  for = "/expeditions/*.geojson"
  [headers.values]
    Cache-Control = "public, max-age=600"

[[headers]]
  for = "/expeditions/*.json"
  [headers.values]
    Cache-Control = "public, max-age=600"

[[headers]]
  for = "/challenges/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=600"

# =========================================================
# 5. HTML BEZ AGRESYWNEGO CACHE
# =========================================================
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/maps/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"