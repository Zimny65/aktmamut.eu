<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AKT MAMUT</title>
        <link rel="icon" type="image/webp" href="/assets/img/M32.webp" />
        <link href="https://fonts.googleapis.com/css2?family=Oswald&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <header id="main-nav"></header>
        <section class="hero">
            <video autoplay muted loop>
                <source src="/assets/video/video.mp4" type="video/mp4" />
                HTML5 video not supported
            </video>
            <h1>
                AKT MAMUT<br />
                <span style="font-size: 0.6em">Expeditions 2015 – 2025</span>
            </h1>
        </section>
        <footer class="footer">
            <div class="footer-center">© AKT Mamut 2015</div>
        </footer>
        <script>
            fetch('/nav.html')
                .then((response) => response.text())
                .then((data) => {
                    document.getElementById('main-nav').innerHTML = data;
                })
                .catch((err) => console.error('Błąd ładowania menu:', err));
        </script>
    </body>
</html>
